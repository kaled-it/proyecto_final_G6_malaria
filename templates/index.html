<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Malaria - Minsa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h2 class="fw-bold text-success">Sistema Predictivo de Picos de Malaria</h2>
                <p class="text-muted">Modelo de Machine Learning (Random Forest Regressor)</p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Parámetros Epidemiológicos</h5>
                    </div>
                    <div class="card-body">
                        <form id="formularioPrediccion">
                            <div class="mb-3">
                                <label for="departamento" class="form-label fw-bold">Departamento</label>
                                <input type="text" class="form-control" id="departamento" placeholder="Ej: LORETO" required style="text-transform: uppercase;">
                            </div>
                            <div class="mb-3">
                                <label for="provincia" class="form-label fw-bold">Provincia</label>
                                <input type="text" class="form-control" id="provincia" placeholder="Ej: MAYNAS" required style="text-transform: uppercase;">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="ano" class="form-label fw-bold">Año</label>
                                    <input type="number" class="form-control" id="ano" min="2009" max="2100" placeholder="Ej: 2026" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="semana" class="form-label fw-bold">Semana (1-53)</label>
                                    <input type="number" class="form-control" id="semana" min="1" max="53" placeholder="Ej: 15" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold">Generar Predicción</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-7">
                
                <div class="card shadow-sm border-success mb-4">
                    <div class="card-body text-center py-4">
                        <h5 class="text-success mb-3">Casos Esperados (Pico Semanal)</h5>
                        <h1 id="resultadoNumero" class="display-3 fw-bold text-dark">-</h1>
                        <p id="resultadoTexto" class="text-muted mb-0">Esperando datos de consulta...</p>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">Historial de Consultas (Base de Datos)</h6>
                        <button class="btn btn-sm btn-outline-light" onclick="cargarHistorial()">Actualizar</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                            <table class="table table-hover table-striped mb-0 text-center">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>Ubicación</th>
                                        <th>Año / Sem</th>
                                        <th>Predicción</th>
                                        <th>Borrar</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaHistorial">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const formulario = document.getElementById('formularioPrediccion');

        // Al cargar la página, traemos los datos de MySQL
        document.addEventListener('DOMContentLoaded', cargarHistorial);

        // Evento cuando le damos click a "Generar Predicción"
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue

            // Recolectamos los datos del formulario
            const datosEntrada = {
                departamento: document.getElementById('departamento').value,
                provincia: document.getElementById('provincia').value,
                ano: parseInt(document.getElementById('ano').value),
                semana: parseInt(document.getElementById('semana').value)
            };

            try {
                // Enviamos los datos por POST a la ruta /predict de Flask
                const respuesta = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datosEntrada)
                });

                const resultado = await respuesta.json();

                if (respuesta.ok) {
                    // Mostramos el resultado en pantalla grande
                    document.getElementById('resultadoNumero').innerText = resultado.casos_predichos.toFixed(2);
                    document.getElementById('resultadoTexto').innerText = `En ${resultado.provincia}, ${resultado.departamento} para la sem. ${resultado.semana} del ${resultado.ano}`;
                    
                    // Recargamos la tabla para ver el nuevo dato guardado en la BD
                    cargarHistorial();
                } else {
                    alert("Hubo un error procesando la predicción.");
                }

            } catch (error) {
                console.error("Error en la petición:", error);
                alert("No se pudo conectar con el servidor de Flask.");
            }
        });

        // Función para consultar todos los registros (ruta GET /registros)
        async function cargarHistorial() {
            try {
                const respuesta = await fetch('/registros');
                const datos = await respuesta.json();
                
                const cuerpoTabla = document.getElementById('tablaHistorial');
                cuerpoTabla.innerHTML = ''; // Limpiamos la tabla

                // Invertimos el arreglo para ver los más nuevos arriba
                datos.reverse().forEach(fila => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="text-start ps-3"><b>${fila.provincia}</b><br><small class="text-muted">${fila.departamento}</small></td>
                        <td class="align-middle">${fila.ano} / S-${fila.semana.toString().padStart(2, '0')}</td>
                        <td class="align-middle fw-bold text-danger">${fila.casos_predichos.toFixed(2)}</td>
                        <td class="align-middle">
                            <button class="btn btn-sm btn-outline-danger" onclick="borrarRegistro(${fila.id})">❌</button>
                        </td>
                    `;
                    cuerpoTabla.appendChild(tr);
                });
            } catch (error) {
                console.error("Error cargando el historial:", error);
            }
        }

        // Función para borrar un registro de la BD (ruta DELETE /registro/<id>)
        async function borrarRegistro(id) {
            if (!confirm("¿Estás seguro de eliminar esta consulta histórica?")) return;

            try {
                const respuesta = await fetch(`/registro/${id}`, {
                    method: 'DELETE'
                });

                if (respuesta.ok) {
                    cargarHistorial(); // Refrescamos la tabla si se borró con éxito
                }
            } catch (error) {
                console.error("Error al borrar:", error);
            }
        }
    </script>
</body>
</html>
